name: CRT Bias Scalper Bot

on:
  schedule:
    # Mengatur bot berjalan otomatis setiap 15 menit (mengikuti penutupan candle 15M)
    - cron: '*/15 * * * *'
  workflow_dispatch: # Membuat tombol manual di GitHub untuk tes bot kapan saja

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Jalankan Bot Eksekusi
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot_scalper.py